<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eSewa Profile</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f3f4f6;
            display: flex;
            justify-content: center;
        }

        .mobile {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            background: #f5f5f5;
            position: relative;
            padding-bottom: 100px;
        }

        .header {
            height: 86px;
            background: #59c100;
            display: flex;
            align-items: center;
            padding: 0 18px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .back-btn {
            width: 26px;
            margin-right: 14px;
            cursor: pointer;
        }

        .profile-section {
            padding: 28px 24px;
            text-align: center;
        }

        .avatar-wrap {
            position: relative;
            width: 110px;
            height: 110px;
            margin: auto;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ededed;
        }

        .edit-photo {
            position: absolute;
            right: 0;
            bottom: 4px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #43c300;
            border: 3px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .edit-photo img {
            width: 18px;
            height: 18px;
        }

        .name {
            margin-top: 18px;
            font-size: 28px;
            color: #333;
            font-weight: 500;
        }

        .username-row {
            margin-top: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .username {
            font-size: 18px;
            color: #6e7680;
        }

        .verify {
            width: 18px;
            height: 18px;
            background: #43c300;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .verify img {
            width: 10px;
        }

        .dob-row {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 7px;
            color: #707780;
            font-size: 15px;
        }

        .dob-row img {
            width: 16px;
        }

        /* EDIT BOX */

        .edit-box {
            margin-top: 28px;
            background: white;
            border-radius: 18px;
            overflow: hidden;

            max-height: 0;
            opacity: 0;
            transform: translateY(-10px);

            transition:
                max-height .4s ease,
                opacity .3s ease,
                transform .3s ease,
                padding .3s ease;

            padding: 0 18px;
        }

        .edit-box.show {
            max-height: 700px;
            opacity: 1;
            transform: translateY(0);
            padding: 18px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            height: 48px;
            border-radius: 14px;
            border: 1px solid #ddd;
            padding: 0 14px;
            font-size: 16px;
            outline: none;
        }

        .save-btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 16px;
            background: #42c300;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        /* CARD */

        .card-row {
            background: white;
            margin: 16px 24px;
            border-radius: 18px;
            overflow: hidden;
        }

        .card-item {
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
        }

        .card-item:last-child {
            border-bottom: none;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .left img {
            width: 24px;
            height: 24px;
        }

        .left h3 {
            font-size: 16px;
            color: #333;
        }

        .left p {
            font-size: 13px;
            color: #777;
            margin-top: 3px;
        }

        /* CHECKBOX */

        .checkbox {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid #43c300;
            background: #43c300;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .2s;
        }

        .checkbox img {
            width: 12px;
        }

        .checkbox.off {
            background: white;
            border: 2px solid #ccc;
        }

        .checkbox.off img {
            display: none;
        }

        /* NAVBAR */

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 420px;
            height: 82px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            position: relative;
            text-align: center;
            font-size: 12px;
            color: #666;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-item.active {
            color: #42c300;
        }

        .nav-item.active::before {
            content: "";
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            height: 4px;
            border-radius: 50px;
            background: #42c300;
        }

        .nav-item img {
            width: 28px;
            margin-bottom: 4px;
        }

        /* TOAST */

        .toast {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 100px;
            background: #222;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            opacity: 0;
            transition: .3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            bottom: 110px;
        }
    </style>
</head>

<body>

    <div class="mobile">

        <div class="header">
            <img src="icons/backbtn.png" class="back-btn" onclick="window.location.href='index.html'">
            <h4>Profile</h4>
        </div>

        <div class="profile-section">

            <div class="avatar-wrap">

                <img id="profileImage" class="avatar" src="icons/profile.png">

                <button class="edit-photo" onclick="choosePhoto()">
                    <img src="icons/edit.png">
                </button>

                <input type="file" id="photoInput" hidden accept="image/*">

            </div>

            <h2 class="name" id="displayName">
                Rikesh Dahal
            </h2>

            <div class="username-row">

                <div class="username" id="displayUsername">
                    @rikeshdahal
                </div>

                <button class="verify" id="verifyBtn">
                    <img src="icons/tick.png">
                </button>

            </div>

            <div class="dob-row">
                <img src="icons/calendar.png">
                <span>Date of Birth</span>
                <span id="displayDob">07/23</span>
            </div>

            <!-- BALANCE -->

            <div class="dob-row" style="margin-top:12px;">
                <img src="icons/balance.png">
                <span>Balance</span>
                <span id="displayBalance">
                    NPR 25,450.75
                </span>
            </div>

            <!-- EDIT BOX -->

            <div class="edit-box" id="editBox">

                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="nameInput">
                </div>

                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="usernameInput">
                </div>

                <div class="input-group">
                    <label>Date Of Birth</label>
                    <input type="text" id="dobInput">
                </div>

                <div class="input-group">
                    <label>Balance Amount</label>
                    <input type="number" id="balanceInput">
                </div>

                <button class="save-btn" onclick="saveProfile()">
                    Save Profile
                </button>

            </div>

        </div>

        <!-- SETTINGS -->

        <div class="card-row">

            <div class="card-item">

                <div class="left">

                    <img src="icons/circleqr.png">

                    <div>
                        <h3>eSewa Circle QR</h3>
                    </div>

                </div>

                <img src="icons/arrow.png" width="18">

            </div>

            <div class="card-item">

                <div class="left">

                    <img src="icons/calendar.png">

                    <div>
                        <h3>Share your birth date</h3>
                        <p>Allow friends to be notified on your birthday.</p>
                    </div>

                </div>

                <div class="checkbox" id="birthdayCheckbox">
                    <img src="icons/tick.png">
                </div>

            </div>

        </div>

        <!-- NAVBAR -->

        <div class="bottom-nav">

            <div class="nav-item">
                <img src="icons/home.png">
                <div>Home</div>
            </div>

            <div class="nav-item">
                <img src="icons/friends.png">
                <div>Friends</div>
            </div>

            <div class="nav-item">
                <img src="icons/groups.png">
                <div>Groups</div>
            </div>

            <div class="nav-item active">
                <img src="icons/profile-nav.png">
                <div>Profile</div>
            </div>

        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>

        const nameInput = document.getElementById('nameInput');
        const usernameInput = document.getElementById('usernameInput');
        const dobInput = document.getElementById('dobInput');
        const balanceInput = document.getElementById('balanceInput');

        const displayName = document.getElementById('displayName');
        const displayUsername = document.getElementById('displayUsername');
        const displayDob = document.getElementById('displayDob');
        const displayBalance = document.getElementById('displayBalance');

        const profileImage = document.getElementById('profileImage');

        const verifyBtn = document.getElementById('verifyBtn');
        const editBox = document.getElementById('editBox');

        const birthdayCheckbox =
            document.getElementById('birthdayCheckbox');

        let editOpen = false;

        // FORMAT MONEY

        function formatMoney(num) {

            return Number(num).toLocaleString('en-US', {

                minimumFractionDigits: 2,
                maximumFractionDigits: 2

            });

        }

        // LOAD BALANCE

        let savedBalance =
            parseFloat(localStorage.getItem('esewa_balance'));

        if (!savedBalance) {

            savedBalance = 25450.75;

            localStorage.setItem(
                'esewa_balance',
                savedBalance
            );

        }

        displayBalance.innerText =
            'NPR ' + formatMoney(savedBalance);

        balanceInput.value = savedBalance;

        // LOAD PROFILE

        const savedUser =
            JSON.parse(localStorage.getItem('esewa_profile'));

        if (savedUser) {

            displayName.innerText = savedUser.name;
            displayUsername.innerText = savedUser.username;
            displayDob.innerText = savedUser.dob;
            profileImage.src = savedUser.photo;

            nameInput.value = savedUser.name;
            usernameInput.value = savedUser.username;
            dobInput.value = savedUser.dob;

        } else {

            nameInput.value = 'Rikesh Dahal';
            usernameInput.value = '@rikeshdahal';
            dobInput.value = '07/23';

        }

        // BIRTHDAY CHECKBOX

        let birthdayShare =
            localStorage.getItem('birthday_share');

        if (birthdayShare === null) {

            birthdayShare = 'true';

            localStorage.setItem(
                'birthday_share',
                'true'
            );

        }

        updateCheckboxUI();

        birthdayCheckbox.addEventListener('click', () => {

            birthdayShare =
                birthdayShare === 'true'
                    ? 'false'
                    : 'true';

            localStorage.setItem(
                'birthday_share',
                birthdayShare
            );

            updateCheckboxUI();

            showToast(

                birthdayShare === 'true'
                    ? 'Birthday Sharing Enabled'
                    : 'Birthday Sharing Disabled'

            );

        });

        function updateCheckboxUI() {

            if (birthdayShare === 'true') {

                birthdayCheckbox.classList.remove('off');

            } else {

                birthdayCheckbox.classList.add('off');

            }

        }

        // EDIT TOGGLE

        verifyBtn.addEventListener('click', () => {

            editOpen = !editOpen;

            if (editOpen) {

                editBox.classList.add('show');

                showToast('Edit Mode Enabled');

            } else {

                editBox.classList.remove('show');

                showToast('Edit Mode Closed');

            }

        });

        // SAVE PROFILE

        function saveProfile() {

            const balanceValue =
                parseFloat(balanceInput.value) || 0;

            const user = {

                name: nameInput.value,
                username: usernameInput.value,
                dob: dobInput.value,
                photo: profileImage.src

            };

            localStorage.setItem(
                'esewa_profile',
                JSON.stringify(user)
            );

            localStorage.setItem(
                'esewa_balance',
                balanceValue
            );

            displayName.innerText = user.name;
            displayUsername.innerText = user.username;
            displayDob.innerText = user.dob;

            displayBalance.innerText =
                'NPR ' + formatMoney(balanceValue);

            showToast('Profile Saved');

            editBox.classList.remove('show');

            editOpen = false;

        }

        // PHOTO UPLOAD

        function choosePhoto() {

            document
                .getElementById('photoInput')
                .click();

        }

        document
            .getElementById('photoInput')

            .addEventListener('change', function (e) {

                const file = e.target.files[0];

                if (!file) return;

                const reader = new FileReader();

                reader.onload = function (event) {

                    profileImage.src =
                        event.target.result;

                    showToast(
                        'Profile Photo Updated'
                    );

                }

                reader.readAsDataURL(file);

            });

        // NAVBAR

        document.querySelectorAll('.nav-item')
            .forEach(item => {

                item.addEventListener('click', function () {

                    document.querySelectorAll('.nav-item')
                        .forEach(nav =>
                            nav.classList.remove('active'));

                    this.classList.add('active');

                });

            });

        // TOAST

        function showToast(message) {

            const toast =
                document.getElementById('toast');

            toast.innerText = message;

            toast.classList.add('show');

            clearTimeout(window.toastTimer);

            window.toastTimer = setTimeout(() => {

                toast.classList.remove('show');

            }, 1800);

        }

    </script>

</body>

</html>
