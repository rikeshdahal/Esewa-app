<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eSewa QR Scanner</title>

    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        button,
        input {
            border: none;
            outline: none;
            background: transparent;
        }

        .mobile {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /* CAMERA */

        #camera {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1);
            transition: .3s;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .28);
        }

        .content {
            position: relative;
            z-index: 5;
            height: 100%;
        }

        /* TOP */

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 18px 0;
        }

        .top-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-btn img {
            width: 26px;
            height: 26px;
            object-fit: contain;
        }

        .title {
            color: white;
            text-align: center;
            margin-top: -36px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: .5px;
        }

        /* FONEPAY */

        .fonepay {
            display: flex;
            justify-content: center;
            margin-top: 28px;
        }

        .fonepay img {
            width: 220px;
            object-fit: contain;
        }

        /* GALLERY */

        .gallery-wrap {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        .gallery-btn {
            width: 82%;
            height: 58px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, .9);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }

        .gallery-btn img {
            width: 28px;
            height: 28px;
        }

        /* SCANNER */

        .scanner-wrap {
            display: flex;
            justify-content: center;
            margin-top: 5%;
        }

        .scanner {
            width: 265px;
            height: 265px;
            border: 4px solid #2ed600;
            border-radius: 28px;
            position: relative;
            overflow: hidden;
        }

        .scan-line {
            position: absolute;
            left: 14px;
            right: 14px;
            height: 3px;
            background: #ff5747;
            border-radius: 999px;
            box-shadow: 0 0 12px rgba(255, 87, 71, .9);
            animation: scan 2s linear infinite alternate;
        }

        @keyframes scan {
            0% {
                top: 24px;
            }

            100% {
                top: 230px;
            }
        }

        /* ZOOM */

        .zoom-wrap {
            display: flex;
            justify-content: center;
            margin-top: 5%;
        }

        .zoom-box {
            width: 168px;
            height: 60px;
            border-radius: 999px;
            background: #ececec;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px;
        }

        .zoom-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 18px;
            color: #222;
            font-weight: 600;
        }

        .zoom-btn.active {
            background: #39c500;
            color: white;
        }

        /* BOTTOM SHEET */

        .bottom-sheet {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f5f5f5;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            z-index: 20;
            overflow: hidden;
            transition: .35s ease;
            height: 120px;
        }

        .bottom-sheet.expand {
            height: 72vh;
        }

        
        .bottom-sheet.expand .up-btn img {
            transform: rotate(180deg);
        }
        .sheet-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 22px 0;
        }

        .tabs {
            display: flex;
            gap: 40px;
        }

        .tab {
            position: relative;
            padding-bottom: 16px;
            font-size: 16px;
            font-weight: 700;
            color: #667789;
        }

        .tab.active {
            color: #39c500;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 56px;
            height: 4px;
            background: #39c500;
            border-radius: 999px;
        }

        .up-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #39c500;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .up-btn img {
            width: 16px;
        }

        .divider {
            height: 1px;
            background: #ddd;
            margin: 12px 18px 0;
        }

        /* PAGES */

        .sheet-page {
            display: none;
        }

        .sheet-page.active {
            display: block;
        }

        /* QR PAGE */

        .qr-card {
            width: 100%;
            text-align: center;
            padding-top: 26px;
        }

        .qr-box {
            width: 260px;
            height: 260px;
            background: white;
            margin: auto;
            border-radius: 18px;
            padding: 18px;
        }

        .qr-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .esewa-logo {
            width: 150px;
            margin-top: 24px;
        }

        .name {
            margin-top: 12px;
            font-size: 22px;
            color: #111;
        }

        .number {
            margin-top: 6px;
            font-size: 17px;
            color: #667789;
        }

        .scan-text {
            margin-top: 70px;
            font-size: 18px;
            color: #222;
        }

        /* FAVORITE */

        .favorite-wrap {
            text-align: center;
            padding-top: 50px;
        }

        .favorite-wrap img {
            width: 220px;
        }

        .favorite-wrap h2 {
            margin-top: 26px;
            font-size: 22px;
            color: #222;
            line-height: 32px;
        }

        .scan-btn {
            width: 240px;
            height: 58px;
            border-radius: 18px;
            background: #39c500;
            color: white;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 28px;
        }

        /* BOTTOM BUTTONS */

        .bottom-actions {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 74px;
            background: white;
            border-top: 1px solid #ddd;
            display: none;
            justify-content: space-around;
            align-items: center;
        }

        .bottom-sheet.expand .bottom-actions {
            display: flex;
        }

        .action-btn {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #39c500;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .action-btn:first-child {
            border-right: 1px solid #ddd;
        }

        .action-btn img {
            width: 24px;
            height: 24px;
        }

        /* TOAST */

        .toast {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 130px;
            background: rgba(20, 20, 20, .95);
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: .3s;
            pointer-events: none;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            bottom: 145px;
        }

        @media(max-width:360px) {

            .scanner {
                width: 240px;
                height: 240px;
            }

            .zoom-wrap {
                margin-top: 50px;
            }

            .gallery-btn {
                width: 88%;
                font-size: 13px;
            }

            .favorite-wrap img {
                width: 190px;
            }

            .scan-btn {
                width: 220px;
            }
        }
    </style>
</head>

<body>

    <div class="mobile">

        <video id="camera" autoplay playsinline></video>

        <div id="overlay"></div>

        <div class="content">

            <div class="top-bar">

                <button class="top-btn" id="flashBtn">
                    <img src="flashoff.png" id="flashImg">
                </button>

                <button class="top-btn" onclick="window.location.href='index.html'">
                    <img src="closebtn.png">
                </button>

            </div>

            <div class="title">
                Scan QR Code to Pay
            </div>

            <div class="fonepay">
                <img src="fonepay.png">
            </div>

            <div class="gallery-wrap">

                <button class="gallery-btn" id="galleryBtn">

                    <img src="galleryqr.png">

                    <span>ADD QR CODE FROM GALLERY</span>

                </button>

            </div>

            <div class="scanner-wrap">

                <div class="scanner">

                    <div class="scan-line"></div>

                </div>

            </div>

            <div class="zoom-wrap">

                <div class="zoom-box">

                    <button class="zoom-btn active" onclick="setZoom(this,1)">
                        1X
                    </button>

                    <button class="zoom-btn" onclick="setZoom(this,2)">
                        2
                    </button>

                    <button class="zoom-btn" onclick="setZoom(this,3)">
                        3
                    </button>

                </div>

            </div>

            <div class="bottom-sheet" id="sheet">

                <div class="sheet-top">

                    <div class="tabs">

                        <button class="tab active" data-tab="myqr">
                            My QR
                        </button>

                        <button class="tab" data-tab="favorite">
                            Favorite QR
                        </button>

                    </div>

                    <button class="up-btn" id="expandBtn">
                        <img src="uparrow.png">
                    </button>

                </div>

                <div class="divider"></div>

                <!-- MY QR -->

                <div class="sheet-page active" id="myqr">

                    <div class="qr-card">

                        <div class="qr-box">
                            <img src="myqr.png">
                        </div>

                        <img src="esewalogo.png" class="esewa-logo">

                        <div class="name">
                            Rikesh Dahal
                        </div>

                        <div class="number">
                            9841255549
                        </div>

                        <div class="scan-text">
                            Scan QR code to receive money
                        </div>

                    </div>

                </div>

                <!-- FAVORITE -->

                <div class="sheet-page" id="favorite">

                    <div class="favorite-wrap">

                        <img src="favoriteqr.png">

                        <h2>
                            No favorite QR code<br>
                            added yet!
                        </h2>

                        <button class="scan-btn">
                            SCAN QR CODE
                        </button>

                    </div>

                </div>

                <!-- BOTTOM ACTIONS -->

                <div class="bottom-actions">

                    <button class="action-btn" onclick="downloadQR()">

                    <img src="downloadqr.png">

                    <span>DOWNLOAD QR</span>

                </button>

                    <button class="action-btn" onclick="shareQR()">

                        <img src="shareqr.png">

                        <span>SHARE</span>

                    </button>

                </div>

            </div>

        </div>

    </div>

    <input type="file" id="fileInput" accept="image/*" hidden>

    <div class="toast" id="toast"></div>

    <script>

        const video = document.getElementById('camera');

        const overlay = document.getElementById('overlay');

        let streamTrack = null;

        const canvas = document.createElement('canvas');

        const ctx = canvas.getContext('2d', {
            willReadFrequently: true
        });

        /* CAMERA */

        async function startCamera() {

            try {

                const stream = await navigator.mediaDevices.getUserMedia({

                    video: {
                        facingMode: {
                            ideal: 'environment'
                        }
                    },

                    audio: false

                });

                video.srcObject = stream;

                streamTrack = stream.getVideoTracks()[0];

                video.onloadedmetadata = () => {

                    video.play();

                    requestAnimationFrame(scanCameraQR);

                };

            } catch (e) {

                showToast('Camera Permission Denied');

                console.log(e);

            }

        }

        startCamera();

        /* REAL QR SCAN */

        function scanCameraQR() {

            if (video.readyState === video.HAVE_ENOUGH_DATA) {

                canvas.width = video.videoWidth;

                canvas.height = video.videoHeight;

                ctx.drawImage(video, 0, 0);

                const imageData = ctx.getImageData(
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );

                const code = jsQR(
                    imageData.data,
                    imageData.width,
                    imageData.height
                );

                if (code) {

                    handleQRResult(code.data);

                }

            }

            requestAnimationFrame(scanCameraQR);

        }

        /* GALLERY */

        const fileInput = document.getElementById('fileInput');

        document.getElementById('galleryBtn').addEventListener('click', () => {

            fileInput.click();

        });

        fileInput.addEventListener('change', (e) => {

            const file = e.target.files[0];

            if (!file) return;

            const img = new Image();

            img.onload = () => {

                canvas.width = img.width;

                canvas.height = img.height;

                ctx.drawImage(img, 0, 0);

                const imageData = ctx.getImageData(
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );

                const code = jsQR(
                    imageData.data,
                    imageData.width,
                    imageData.height
                );

                if (code) {

                    handleQRResult(code.data);

                } else {

                    showToast('No QR Found');

                }

            };

            img.src = URL.createObjectURL(file);

        });

        /* HANDLE QR */

        function handleQRResult(rawData) {
    try {
        const data = JSON.parse(rawData);
        if (data.eSewa_id && data.name) {
            // Save to sessionStorage and redirect
            sessionStorage.setItem('qr_name', data.name);
            sessionStorage.setItem('qr_id', data.eSewa_id);
            showToast('QR Scanned! Redirecting...');
            setTimeout(() => {
                window.location.href = 'sendmoney.html';
            }, 900);
        } else {
            showToast('Invalid QR');
        }
    } catch {
        showToast('Invalid QR');
    }
}

        /* FLASH */

        let flashOn = false;

        const flashBtn = document.getElementById('flashBtn');

        const flashImg = document.getElementById('flashImg');

        flashBtn.addEventListener('click', async () => {

            flashOn = !flashOn;

            try {

                if (streamTrack) {

                    const capabilities =
                        streamTrack.getCapabilities();

                    if (capabilities.torch) {

                        await streamTrack.applyConstraints({
                            advanced: [{
                                torch: flashOn
                            }]
                        });

                    }

                }

            } catch (e) {

                console.log('Torch unsupported');

            }

            if (flashOn) {

                flashImg.src = 'flashon.png';

                overlay.style.background =
                    'rgba(0,0,0,.28)';

                showToast('Flash ON');

            } else {

                flashImg.src = 'flashoff.png';

                overlay.style.background =
                    'rgba(0,0,0,.45)';

                showToast('Flash OFF');

            }

        });

        /* ZOOM */

        function setZoom(el, zoom) {

            document.querySelectorAll('.zoom-btn').forEach(btn => {

                btn.classList.remove('active');

            });

            el.classList.add('active');

            video.style.transform = `scale(${zoom})`;

            showToast(zoom + 'X Zoom');

        }

        /* TABS */

        const tabs = document.querySelectorAll('.tab');

        tabs.forEach(tab => {

            tab.addEventListener('click', () => {

                tabs.forEach(t => {
                    t.classList.remove('active');
                });

                tab.classList.add('active');

                const target = tab.dataset.tab;

                document.querySelectorAll('.sheet-page')
                    .forEach(page => {
                        page.classList.remove('active');
                    });

                document.getElementById(target)
                    .classList.add('active');

            });

        });

        /* EXPAND */

        const sheet = document.getElementById('sheet');

        document.getElementById('expandBtn')
            .addEventListener('click', () => {

                sheet.classList.toggle('expand');

            });
             /* Download */
        function downloadQR() {

            const a = document.createElement('a');

            a.href = 'myqr.png';

            a.download = 'esewa-qr.png';

            a.click();

        }
        /* SHARE */

        async function shareQR() {

            try {

                if (navigator.share) {

                    await navigator.share({

                        title: 'eSewa QR',

                        text: 'Scan my eSewa QR'

                    });

                } else {

                    showToast('Share Unsupported');

                }

            } catch {

                showToast('Share Cancelled');

            }

        }

        /* TOAST */

        function showToast(message) {

            const toast = document.getElementById('toast');

            toast.innerText = message;

            toast.classList.add('show');

            clearTimeout(window.toastTimer);

            window.toastTimer = setTimeout(() => {

                toast.classList.remove('show');

            }, 1800);

        }

    </script>

</body>

</html>
